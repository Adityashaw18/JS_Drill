<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Weather Check Website</title>
</head>
<body>
    
    <div class="wrapper">
        <h1>Weather Website</h1>

        <div class="tab-container">
            <p class="tab" data-userWeather>Your Weather</p>
            <p class="tab" data-searchWeather>Search Weather</p>
        </div>

        <div class="weather-container">

            <!-- grant access to user location -->
            <div class="sub-container grant-location-container">
                <img src="./images/location.png" width="80" height="80" loading="lazy">
                <p>grant location access</p>
                <p>Allow Access to get Weather information</p>
                <button class="btn" data-grantAccess>Grant Access</button>
            </div>

            <!-- Search form -->
            <form action="" class="form-container" data-searchForm>
                <input placeholder="Search for City..." data-searchInput>
                <button class="btn" type="submit">
                    <img src="./images/search.png" width="20" height="20" loading="lazy">
                </button>
            </form>

            <!-- Loading Screen container -->
            <div class="loading-container">
                <img src="./images/loading.gif" width="150" height="150">
                <p>Loading...</p>
            </div>

            <!-- Show weather info -->
            <div class="user-info-container">
                <!-- city name and Flag -->
                <div class="name">
                    <p data-cityName></p>
                    <img data-countryIcon>
                </div>
                <!-- WeatherDescription -->
                <p data-weatherDescription></p>
                <!-- weatherIcon -->
                <img data-weatherIcon>
                <!-- Temperature -->
                <p data-temp></p>

                <!-- 3 cards - parameters -->
                 <div class="parameter-container">

                    <!-- card 1 -->
                    <div class="parameter">
                        <img src="./images/wind.png" alt="">
                        <p>wind speed</p>
                        <p data-windspeed></p>
                    </div>

                    <!-- card 2 -->
                    <div class="parameter">
                        <img src="./images/humidity.png" >
                        <p>Humidity</p>
                        <p data-humidity></p>
                    </div>

                    <!-- card 3 -->
                    <div class="parameter">
                        <img src="./images/cloud.png">
                        <p>Clouds</p>
                        <p data-cloudiness></p>
                    </div>

                 </div>

            </div>
        </div>

    </div>




    

<script src="weatherscript.js"></script>

</body>
</html>
