<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/599f60a386.js" crossorigin="anonymous"></script>
    <title>Increment and Decrement</title>
</head>
<body>
    
    <div class="flex flex-col items-center justify-center w-screen h-screen gap-10 bg-[#344151]">
        <div class="text-[#0398d4] font-medium text-[20px]">
            Increment And Decrement
        </div>

        <div class="flex gap-12 border bg-white rounded-sm text-[25px] text-[#344151] p-3 px-5">
            <!-- Negative button -->
            <button onclick="decrement()" class="border-[#bfbfbf] border-r-2 pr-5">
                <i class="fa-solid fa-minus"></i>
            </button>
        
            <div id="counter" class="font-bold">0</div>
            <!-- Positive button -->
            <button onclick="increment()" class="border-[#bfbfbf] border-l-2 pl-5">
                <i class="fa-solid fa-plus"></i>
            </button>

        </div>

    </div>

<script>
    alert("Welcome to Increment and Decrement page");
    const counterValue = document.querySelector("#counter");
    
    function increment(){
        let value = parseInt(counterValue.innerText);
        counterValue.innerText = ++value;
    }
    function decrement(){
        let value = parseInt(counterValue.innerText);
        counterValue.innerText = --value;
    }

</script>
    

</body>
</html>
